name: Probe USWDGC weather-delay state (one-shot)

# Only 35/78 players carry live entries after weather delays. Dump per-round
# sheet stats to see how suspended/backlogged players are represented.
on:
  push:
    branches: [claude/standings-attendance-bug-8j9c7k]
    paths: ['.github/workflows/probe-uswdgc2.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dump round sheets
        run: |
          python - <<'EOF'
          import json
          from dgpt import live_api

          ev = live_api.fetch_event(97341)
          div = next(d for d in ev["Divisions"] if d["Division"] == "FPO")
          print("FinalRound:", ev.get("FinalRound"), "| FPO LatestRound:", div.get("LatestRound"),
                "| HighestCompletedRound:", ev.get("HighestCompletedRound"))

          for rnd in (1, 2, 3):
              try:
                  scores = live_api.fetch_round(97341, "FPO", rnd).get("scores") or []
              except Exception as e:
                  print(f"\nround {rnd}: {type(e).__name__}: {e}")
                  continue
              n_topar = sum(1 for s in scores if s.get("ToPar") is not None)
              n_rtp   = sum(1 for s in scores if s.get("RoundtoPar") not in (None, 0))
              n_done  = sum(1 for s in scores if s.get("HasRoundScore"))
              n_mid   = sum(1 for s in scores if not s.get("HasRoundScore") and (s.get("Played") or 0) > 0)
              n_zero  = sum(1 for s in scores if not s.get("HasRoundScore") and not s.get("Played"))
              n_999   = sum(1 for s in scores if str(s.get("GrandTotal")) == "999")
              print(f"\nround {rnd}: rows {len(scores)} | ToPar set {n_topar} | done {n_done} | mid-round {n_mid} | untouched {n_zero} | GT999 {n_999}")
              def show(label, pred):
                  m = next((s for s in scores if pred(s)), None)
                  if m: print(f"  {label}:", json.dumps({k: m.get(k) for k in ("Name","PDGANum","ToPar","Played","HasRoundScore","RoundtoPar","GrandTotal","RunningPlace")}))
              show("done sample", lambda s: s.get("HasRoundScore"))
              show("mid sample", lambda s: not s.get("HasRoundScore") and (s.get("Played") or 0) > 0)
              show("untouched sample", lambda s: not s.get("HasRoundScore") and not s.get("Played"))
          EOF
