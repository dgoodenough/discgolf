name: Probe USWDGC live state (one-shot)

# Live standings froze at the 07:03Z seed during USWDGC round 1: livecheck
# reports "unchanged" every cycle, so PDGA Live is serving us static data
# under TournID 97341 / FPO. Dump what the live API actually returns so we
# can see whether scores exist and what live_field computes. Read-only.
on:
  push:
    branches: [claude/standings-attendance-bug-8j9c7k]
    paths: ['.github/workflows/probe-uswdgc.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dump live API state for 97341
        run: |
          python - <<'EOF'
          import json
          from dgpt import live_api

          ev = live_api.fetch_event(97341)
          print("event keys:", sorted(ev.keys()))
          print("Name:", ev.get("Name") or ev.get("EventName"))
          print("FinalRound:", ev.get("FinalRound"), "| HighestCompletedRound:", ev.get("HighestCompletedRound"))
          print("Divisions:", json.dumps(ev.get("Divisions"), default=str)[:800])

          for rnd in (1, 2):
              try:
                  data = live_api.fetch_round(97341, "FPO", rnd)
              except Exception as e:
                  print(f"round {rnd}: {type(e).__name__}: {e}")
                  continue
              scores = data.get("scores") or []
              posted = [s for s in scores if s.get("ToPar") is not None]
              print(f"\nround {rnd}: {len(scores)} rows, {len(posted)} with ToPar")
              print("round-level keys:", sorted(k for k in data.keys() if k != "scores")[:20])
              for s in scores[:2]:
                  print("  sample:", json.dumps({k: s.get(k) for k in ("Name","PDGANum","ToPar","Played","HasRoundScore","Rating","GrandTotal","PoolLetter","Round","RoundtoPar")}, default=str))
              if posted:
                  print("  first posted:", json.dumps({k: posted[0].get(k) for k in ("Name","ToPar","Played")}, default=str))

          print("\nlive_field(97341,'FPO'):")
          f = live_api.live_field(97341, "FPO")
          if f is None:
              print("  -> None")
          else:
              started = {p: v for p, v in f.items() if v["rem"] < 4}
              print(f"  -> {len(f)} players, {len(started)} with progress")
          EOF
