name: Diagnose StatMando FPO page (one-shot)

# Ad-hoc probe: the FPO rankings page has parsed to 0 rows since 2026-07-13
# while MPO parses fine. Fetch both from a runner (their site serves CI fine)
# and print enough structure to see what changed. Read-only, no secrets.
on:
  push:
    branches: [claude/standings-attendance-bug-8j9c7k]
    paths: ['.github/workflows/diagnose-statmando.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch and dissect rankings pages
        run: |
          python - <<'EOF'
          import re, urllib.request, urllib.error

          UA = {"User-Agent": "Mozilla/5.0 (dgpt-forecast validation; github.com/dgoodenough/discgolf)"}

          def probe(url):
              print(f"\n=== {url} ===")
              try:
                  req = urllib.request.Request(url, headers=UA)
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read().decode("utf-8", "replace")
                      print(f"status={r.status} bytes={len(raw)} final_url={r.url}")
              except urllib.error.HTTPError as e:
                  print(f"HTTPError {e.code}: {e.reason}")
                  return
              except Exception as e:
                  print(f"{type(e).__name__}: {e}")
                  return
              print("title:", (re.search(r"<title[^>]*>(.*?)</title>", raw, re.S) or [None, "?"])[1].strip()[:120])
              print("tables:", len(re.findall(r"<table", raw)),
                    "| tr:", len(re.findall(r"<tr[\s>]", raw)),
                    "| td:", len(re.findall(r"<td[\s>]", raw)))
              # first three rows that contain any <td>, raw but truncated
              shown = 0
              for row in re.findall(r"<tr[^>]*>.*?</tr>", raw, re.S):
                  if "<td" not in row:
                      continue
                  print(f"--- row {shown + 1} (len {len(row)}):")
                  print(re.sub(r"\s+", " ", row)[:600])
                  shown += 1
                  if shown == 3:
                      break
              if not shown:
                  print("(no <td>-bearing rows)")
                  # surface hints of a client-rendered or moved table
                  for pat, label in ((r'id="[^"]*rank[^"]*"', "rank-ish ids"),
                                     (r'class="[^"]*table[^"]*"', "table-ish classes"),
                                     (r"<script[^>]*src=\"([^\"]+)\"", "scripts"),
                                     (r'href="(/rankings[^"]*)"', "rankings links")):
                      hits = sorted(set(re.findall(pat, raw)))[:8]
                      print(f"{label}: {hits}")

          probe("https://statmando.com/rankings/dgpt/mpo")
          probe("https://statmando.com/rankings/dgpt/fpo")
          EOF
