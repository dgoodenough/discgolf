name: Probe player-statistics payload (one-shot)

# Verify the field names/shape of the PDGA player-statistics endpoint before
# trusting dgpt/ratings.py's extraction — the sandbox can't reach the API.
# Prints one raw record (keys + values for a known player) and the extraction
# yield per division. Read-only; no commits.
on:
  push:
    branches: [claude/standings-attendance-bug-8j9c7k]
    paths: ['.github/workflows/probe-ratings.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe endpoint
        env:
          PDGA_USERNAME: ${{ secrets.PDGA_USERNAME }}
          PDGA_PASSWORD: ${{ secrets.PDGA_PASSWORD }}
        run: |
          python - <<'EOF'
          import json
          from dgpt import config, ratings
          from dgpt.pdga_api import PDGAClient

          client = PDGAClient()
          for div in ("MPO", "FPO"):
              recs = client.player_statistics(year=config.SEASON, division_code=div)
              print(f"\n=== {div}: {len(recs)} records ===")
              if recs:
                  print("first record:", json.dumps(recs[0], default=str)[:600])
              parsed = [kv for kv in (ratings._extract(r) for r in recs) if kv]
              print(f"extraction yield: {len(parsed)}/{len(recs)}")
              if div == "MPO":
                  buhr = [r for r in recs if "buhr" in json.dumps(r, default=str).lower()]
                  if buhr:
                      print("Buhr record:", json.dumps(buhr[0], default=str)[:600])
                  hit = [kv for kv in parsed if kv[1] >= 1050]
                  print("parsed 1050+:", sorted(hit, key=lambda t: -t[1])[:5])
          EOF
