name: Live refresh

# During tournament weekends, keep the site near-real-time. Runs every 15
# minutes but no-ops unless a points event is currently in progress, so it's
# cheap off-weekend. (Whether an in-progress event should show provisional
# live results or model the remaining holes is still TBD — for now this makes
# completed events appear within ~15 min instead of waiting for the weekly run.)
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: refresh-forecast   # share with the weekly full refresh; never overlap
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore results cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: pdga-cache-2026-${{ github.run_id }}
          restore-keys: pdga-cache-2026-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Refresh only if an event is live
        env:
          PDGA_USERNAME: ${{ secrets.PDGA_USERNAME }}
          PDGA_PASSWORD: ${{ secrets.PDGA_PASSWORD }}
        run: python -m dgpt.refresh --sims 100000 --only-if-live
      - name: Commit if anything changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data results predictions
          if git diff --cached --quiet -I'"generated":'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Live refresh ($(date -u +'%F %H:%MZ'))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Pages build (retry on transient deploy failure)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            gh api -X POST "repos/${{ github.repository }}/pages/builds" >/dev/null
            for i in $(seq 1 20); do
              sleep 10
              status=$(gh api "repos/${{ github.repository }}/pages/builds/latest" --jq .status)
              echo "attempt $attempt: $status"
              [ "$status" = "built" ] && exit 0
              [ "$status" = "errored" ] && break
            done
          done
          echo "::warning::Pages did not reach 'built' after 3 attempts (data commit still landed)"
