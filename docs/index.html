<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DGPT Standings Forecast</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="style.css">
<script data-goatcounter="https://dgoodenough.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body class="ledger">
<div id="app">
  <header id="top">
    <div class="title">
      <h1>DGPT Standings Forecast</h1>
      <p class="sub">Powerball Cup qualification odds from a 100k-run Monte Carlo ·
        <span id="meta-line"></span></p>
      <p id="live-note" hidden></p>
    </div>
    <div class="controls">
      <div class="seg" id="division-seg">
        <button data-div="mpo" class="active">MPO</button>
        <button data-div="fpo">FPO</button>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="view-forecast"></section>
  </main>

  <footer>
    <p id="pdga-attribution">Event and player data © 2026 <a href="https://www.pdga.com">PDGA</a> ·
      PDGA Authorized Developer</p>
    <p>Points engine validated exactly against official StatMando standings ·
      <a href="https://github.com/dgoodenough/discgolf">source & methodology</a></p>
  </footer>
</div>
<div id="spark-tip" hidden></div>
<script src="app.js"></script>
</body>
</html>
